spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: test-secret-key-for-integration-tests-minimum-256-bits-long
  expiration: 3600000
  refresh-expiration: 7200000

app:
  cors:
    allowed-origins: http://localhost:3000

aop:
  performance:
    warn-threshold-ms: 5000
    critical-threshold-ms: 30000

logging:
  level:
    com.domuspacis: WARN
    org.hibernate.SQL: WARN
