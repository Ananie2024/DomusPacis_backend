spring:
  application:
    name: domuspacis-platform

  datasource:
    # This line looks for Railway variables (MYSQLHOST) first.
    # If missing, it uses localhost for your local machine.
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:domuspacis}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  # Crucial for Railway to bind the port
  port: ${PORT:8080}

# STOPS THE LOG FLOODING
logging:
  level:
    root: INFO
    com.domuspacis: DEBUG           # See exactly what your service is doing
    org.springframework.beans: DEBUG # Watch the "Injection" process step-by-step
    org.springframework.boot: INFO
    org.hibernate.SQL: DEBUG         # See the actual queries being sent
    org.hibernate.type.descriptor.sql: TRACE # See the parameters in those queries

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:*}