spring:
  application:
    name: domuspacis-platform

  datasource:
    # This line looks for Railway variables (MYSQLHOST) first.
    # If missing, it uses localhost for your local machine.
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:domuspacis}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  # Crucial for Railway to bind the port
  port: ${PORT:8080}

# STOPS THE LOG FLOODING
logging:
  level:
    root: WARN                          # Only warnings/errors from everything else

    # Your app - see info + all errors
    com.domuspacis: INFO

    # Spring - only errors (startup failures, bean issues)
    org.springframework: ERROR
    org.springframework.web: WARN       # Promotes 404s and bad requests to visible

    # Database - only errors (connection failures, query errors)
    org.hibernate: ERROR
    com.zaxxer.hikari: WARN             # Show pool warnings (exhaustion, timeouts)

    # Security - show auth failures
    org.springframework.security: WARN
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:*}