domuspacis:
  founding-year: 2026

spring:
  application:
    name: domuspacis-platform

  # GLOBAL DEFAULTS (Safe for Local Dev)
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:domuspacis}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:ananie@11072}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        type:
          preferred_uuid_jdbc_type: CHAR

  server:
    port: ${PORT:8080} # Essential for Railway
    error:
      include-message: always

  # Default Logging (Prevents log flooding)
  logging:
    level:
      root: INFO
      com.domuspacis: INFO
      org.springframework.security: INFO

# =========================
# 🚀 RAILWAY / PRODUCTION PROFILE
# =========================
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Maps directly to Railway's automatic MySQL variables
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC
    username: ${domuspacis}
    password: ${ananie@11072}

  jpa:
    hibernate:
      ddl-auto: none # Safer for production; use 'update' only if you are sure
    show-sql: false

  logging:
    level:
      root: WARN
      com.domuspacis: INFO
      org.springframework.web: WARN